/* تعريب صوتي تلقائي لأي اسم لاتيني — البيانات تبقى إنجليزية في المصدر،
   والتحويل يتم لحظة العرض فلا يحدث أي تعارض عند التحديث */
const AR_DIGRAPHS=[["tsch","تش"],["sch","ش"],["kh","خ"],["gh","غ"],["sh","ش"],["ch","تش"],["th","ث"],["dh","ذ"],["ph","ف"],["ck","ك"],["qu","كو"],["ou","و"],["oo","و"],["ee","ي"],["ai","اي"],["ay","اي"],["ei","اي"],["ey","ي"],["ie","ي"],["aw","او"],["ow","او"]];
const AR_LETTERS={a:"ا",b:"ب",c:"ك",d:"د",e:"ي",f:"ف",g:"ج",h:"ه",i:"ي",j:"ج",k:"ك",l:"ل",m:"م",n:"ن",o:"و",p:"ب",q:"ك",r:"ر",s:"س",t:"ت",u:"و",v:"ف",w:"و",x:"كس",y:"ي",z:"ز"};
const arLatinWord = function(word){
  let w=String(word||"").toLowerCase().replace(/[^a-z]/g,"");
  if(!w) return word;
  let out="", first=true;
  while(w.length){
    let hit=null;
    for(let i=0;i<AR_DIGRAPHS.length;i++){ if(w.indexOf(AR_DIGRAPHS[i][0])===0){hit=AR_DIGRAPHS[i];break;} }
    if(hit){ out+=hit[1]; w=w.slice(hit[0].length); first=false; continue; }
    const ch=w[0]; w=w.slice(1);
    while(w[0]===ch) w=w.slice(1); // الحروف المكررة تنطق مرة
    if(first&&"aeiou".indexOf(ch)>=0){ out+=(ch==="a"?"أ":(ch==="o"||ch==="u")?"أو":"إي"); first=false; continue; }
    first=false;
    out+=(AR_LETTERS[ch]||"");
  }
  return out||word;
};

const AC = {};

const setCached = (k,d,ttl) => { AC[k]={d,t:Date.now(),ttl:ttl||15*60*1000}; };

const liveFor = (match, liveMap) => {
  if(!match||!match.api_fixture_id||!liveMap) return null;
  const lv = liveMap[String(match.api_fixture_id)];
  if(!lv) return null;

  if(!swapped) return lv;
  return Object.assign({}, lv, {goals:{home:lv.goals&&lv.goals.away, away:lv.goals&&lv.goals.home}});
};

/* ── POINTS (live calc) ─────────────────────────────────────── */
const calcPts = (pred, match) => {
  if(!pred||match.status!=="finished"||match.result_team1==null) return null;
  const p1=pred.pred_team1, p2=pred.pred_team2;
  const r1=match.result_team1, r2=match.result_team2;
  if(p1===r1&&p2===r2) return 3;
  if((p1>p2&&r1>r2)||(p1<p2&&r1<r2)||(p1===p2&&r1===r2)) return 1;
  return 0;
};

/* ── GROUP STANDINGS ────────────────────────────────────────── */
const calcStandings = (matches, teams) => {
  const st = {};
  Object.values(teams).forEach(t => { st[t.id]={team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}; });
  matches.filter(m=>(m.stage==="group"||!m.stage)&&m.status==="finished").forEach(m=>{
    const a=st[m.team1_id], b=st[m.team2_id];
    if(!a||!b) return;
    const r1=m.result_team1, r2=m.result_team2;
    a.p++;b.p++;a.gf+=r1;a.ga+=r2;b.gf+=r2;b.ga+=r1;
    if(r1>r2){a.w++;a.pts+=3;b.l++;}
    else if(r1<r2){b.w++;b.pts+=3;a.l++;}
    else{a.d++;a.pts++;b.d++;b.pts++;}
    a.gd=a.gf-a.ga;b.gd=b.gf-b.ga;
  });
  const grps={};
  Object.values(st).forEach(s=>{const g=s.team.group_id;(grps[g]=grps[g]||[]).push(s);});
  Object.keys(grps).forEach(g=>{grps[g].sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);});
  return grps;
};

  const [tab, setTab] = useState("home");

  const loadProfile = async (uid, retry) => {
    if(retry===undefined) retry=0;
    try {
      const {data, error} = await sb.from("profiles").select("*").eq("id",uid).single();
      if(data) {
        setProfile(data);
        setScr(data.approved?"app":"pending");
      } else if(error && error.code==="PGRST116") {
        // ملف المستخدم مو موجود بعد - انتظر الـ trigger ينشئه
        if(retry<5) setTimeout(function(){loadProfile(uid,retry+1);}, 800);
        else setScr("pending"); // الجلسة صحيحة، لا نرجعه لتسجيل الدخول بسبب تأخر ملف المستخدم
      } else if(retry<3) {
        setTimeout(function(){loadProfile(uid,retry+1);}, 800);
      } else {
        setScr("pending");
      }
    } catch(e) {
      console.error("loadProfile error:", String(e));
      if(retry<3) setTimeout(function(){loadProfile(uid,retry+1);}, 800);
      else setScr("pending");
    }
  };

  useEffect(function(){
    let settled = false;
    const done = function(scr){ if(!settled){settled=true;setScr(scr);} };
    const t = setTimeout(function(){done("auth");}, 8000);

    sb.auth.getSession().then(function(res){
      const session = res.data && res.data.session;
      clearTimeout(t);
      if(session && session.user) {
        loadProfile(session.user.id);
      } else {
        done("auth");
      }
    }).catch(function(){ clearTimeout(t); done("auth"); });

    const sub = sb.auth.onAuthStateChange(function(ev, session){
      if(session && session.user) {
        if(ev==="PASSWORD_RECOVERY") {
          // جاء من رابط "نسيت كلمة المرور" في الإيميل — نعرض شاشة تعيين كلمة جديدة
          settled=true; clearTimeout(t); setScr("recovery");
        } else if(ev==="SIGNED_IN" || ev==="TOKEN_REFRESHED") {
          loadProfile(session.user.id);
        }
      } else {
        setProfile(null); setScr("auth");
      }
    });
    const subscription = sub.data && sub.data.subscription;

    return function(){
      if(subscription) subscription.unsubscribe();
      clearTimeout(t);
      settled=true;
    };
  }, []);

  const signOut = async () => {
    await sb.auth.signOut();
    setProfile(null); setScr("auth");
  };

  if(scr==="loading") return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:14}}>
      <div style={{fontSize:44}}>⚽</div>
      <div className="spin"/>
      <div style={{color:C.sub,fontSize:13.5,marginTop:4}}>جاري التحميل...</div>
    </div>
  );
  if(scr==="auth") return <AuthScr onSuccess={function(uid){setScr("loading");loadProfile(uid);} }/>;
  if(scr==="recovery") return <RecoveryScr onDone={function(){
    setScr("loading");
    sb.auth.getSession().then(function(res){
      const s=res.data&&res.data.session;
      if(s&&s.user) loadProfile(s.user.id); else setScr("auth");
    });
  }}/>;
  if(scr==="pending") return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:14}}>⏳</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>حسابك تحت المراجعة</div>
      <div style={{fontSize:14,color:C.sub,marginBottom:28}}>انتظر موافقة المشرف</div>
      <Btn onClick={signOut} color="dim">تسجيل الخروج</Btn>
    </div>
  );
  return <MainApp profile={profile} setProfile={setProfile} tab={tab} setTab={setTab} signOut={signOut}/>;
}

/* ═══════════════ تعيين كلمة مرور جديدة (بعد رابط الاستعادة) ═══ */
function RecoveryScr({onDone}) {
  const [p1,setP1] = useState("");
  const [p2,setP2] = useState("");
  const [err,setErr] = useState("");
  const [busy,setBusy] = useState(false);
  const go = async () => {
    setErr("");
    if(p1.length<6) { setErr("كلمة المرور 6 أحرف على الأقل"); return; }
    if(p1!==p2) { setErr("الكلمتان غير متطابقتين"); return; }
    setBusy(true);
    try {
      const {error} = await sb.auth.updateUser({password:p1});
      if(error) throw error;
      onDone();
    } catch(e) { setErr(String(e.message||e)); setBusy(false); }
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px"}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:6}}>🔑</div>
          <div style={{fontSize:20,fontWeight:900}}>تعيين كلمة مرور جديدة</div>
        </div>
        <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:20,padding:24}}>
          <Inp value={p1} onChange={setP1} placeholder="كلمة المرور الجديدة" type="password"/>
          <Inp value={p2} onChange={setP2} placeholder="تأكيد كلمة المرور" type="password"/>
          {err && <div style={{color:C.red,fontSize:13,marginBottom:10,textAlign:"center"}}>{err}</div>}
          <Btn onClick={go} color="gold" disabled={busy} full>{busy?"...":"حفظ والدخول"}</Btn>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════ AUTH ═══════════════════════════════ */
function AuthScr({onSuccess}) {
  const [isLogin,setIsLogin] = useState(true);
  const [email,setEmail] = useState("");
  const [pass,setPass] = useState("");
  const [name,setName] = useState("");
  const [user,setUser] = useState("");
  const [err,setErr] = useState("");
  const [ok,setOk] = useState("");
  const [busy,setBusy] = useState(false);
  const [regOpen,setRegOpen] = useState(true);

  useEffect(function(){
    // إذا كان التسجيل معطلاً نخفي خيار إنشاء الحساب كلياً (والسيرفر يرفض أيضاً)
    q(sb.from("app_settings").select("value").eq("key","registration_open").maybeSingle()).then(function(r){
      if(r.data && r.data.value==="false"){ setRegOpen(false); setIsLogin(true); }
    });
  },[]);

  const go = async () => {
    setErr(""); setOk(""); setBusy(true);
    try {
      if(isLogin) {
        const {data:authData, error} = await sb.auth.signInWithPassword({email,password:pass});
        if(error) throw error;
        setOk("تم الدخول، جاري فتح التطبيق...");
        // انتقال مباشر بدون انتظار onAuthStateChange
        if(authData && authData.user && onSuccess) {
          onSuccess(authData.user.id);
          return; // لا نكمل، loadProfile هي اللي تغير الشاشة
        }
      } else {
        if(!name.trim()||!user.trim()) throw new Error("جميع الحقول مطلوبة");
        if(user.trim().length<3) throw new Error("الاسم المستعار 3 أحرف على الأقل");
        // فحص مبكر لإعداد التسجيل (السيرفر يرفض أيضاً عبر trigger حتى لو تم تجاوز الواجهة)
        const regRes = await q(sb.from("app_settings").select("value").eq("key","registration_open").maybeSingle());
        if(regRes.data && regRes.data.value==="false") throw new Error("التسجيل مغلق حالياً");
        const {error} = await sb.auth.signUp({email,password:pass,
          options:{data:{display_name:name.trim(),username:user.trim().toLowerCase()}}});
        if(error) throw error;
        setOk("تم التسجيل — انتظر موافقة المشرف");
      }
    } catch(e) {
      const msg=String(e.message||e);
      setErr(msg==="Invalid login credentials"?"الإيميل أو كلمة المرور غلط"
        :msg.indexOf("Database error")>=0?"التسجيل مغلق حالياً أو حدث خطأ — تواصل مع المشرف"
        :msg);
    }
    setBusy(false);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px"}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:6}}>⚽</div>
          <div style={{fontSize:22,fontWeight:900}}>توقعات كأس العالم 2026</div>
          <div style={{fontSize:12.5,color:C.gold,marginTop:4,letterSpacing:1}}>USA · CANADA · MEXICO</div>
        </div>
        <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:20,padding:24}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:20,textAlign:"center",color:C.gold}}>
            {isLogin?"تسجيل الدخول":"إنشاء حساب"}
          </div>
          {!isLogin && <Inp value={name} onChange={setName} placeholder="الاسم الكامل"/>}
          {!isLogin && <Inp value={user} onChange={setUser} placeholder="اسم مستعار (faisal)"/>}
          <Inp value={email} onChange={setEmail} placeholder="البريد الإلكتروني" type="email"/>
          <Inp value={pass} onChange={setPass} placeholder="كلمة المرور" type="password"/>
          {err && <div style={{color:C.red,fontSize:13.5,marginBottom:10,textAlign:"center"}}>{err}</div>}
          {ok && <div style={{color:C.green,fontSize:13.5,marginBottom:10,textAlign:"center"}}>{ok}</div>}
          <Btn onClick={go} color="gold" disabled={busy} full>{busy?"...":(isLogin?"دخول":"تسجيل")}</Btn>
          {isLogin && (
            <div style={{textAlign:"center",marginTop:12,fontSize:13,color:C.sub,cursor:"pointer"}}
              onClick={async function(){
                setErr(""); setOk("");
                if(!email.trim()){ setErr("اكتب بريدك الإلكتروني أولاً ثم اضغط نسيت كلمة المرور"); return; }
                setBusy(true);
                try {
                  const {error} = await sb.auth.resetPasswordForEmail(email.trim(),{redirectTo:"https://q8broker.github.io/wc2026/"});
                  if(error) throw error;
                  setOk("أرسلنا رابط استعادة كلمة المرور إلى بريدك — افحص أيضاً مجلد السبام");
                } catch(e) { setErr(String(e.message||e)); }
                setBusy(false);
              }}>
              نسيت كلمة المرور؟ <span style={{color:C.gold,fontWeight:700}}>أرسل رابط الاستعادة</span>
            </div>
          )}
          {regOpen?(
            <div style={{textAlign:"center",marginTop:14,fontSize:14,color:C.sub}}>
              {isLogin?"ماعندك حساب؟ ":"عندك حساب؟ "}
              <span style={{color:C.gold,cursor:"pointer",fontWeight:700}}
                onClick={function(){setIsLogin(!isLogin);setErr("");setOk("");}}>
                {isLogin?"سجّل":"ادخل"}
              </span>
            </div>
          ):(
            <div style={{textAlign:"center",marginTop:14,fontSize:12.5,color:C.dim}}>التسجيل مغلق حالياً</div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════ MAIN APP ═══════════════════════════ */
function MainApp({profile,setProfile,tab,setTab,signOut}) {
  const [matches,   setMatches]    = useState([]);
  const [myPreds,   setMyPreds]    = useState({});
  const [allPreds,  setAllPreds]   = useState([]);
  const [allChamp,  setAllChamp]   = useState([]);
  const [myChamp,   setMyChamp]    = useState(null);
  const [champWin,  setChampWin]   = useState("");
  const [favs,      setFavs]       = useState(new Set());
  const [teams,     setTeams]      = useState({});
  const [profiles,  setProfiles]   = useState([]);
  const [pending,   setPending]    = useState([]);
  const [liveMap,   setLiveMap]    = useState({});
  const [appSettings,setAppSettings] = useState({});
  const [champLock, setChampLock]  = useState(new Date("2026-07-04T17:00:00Z"));
  const [popup,     setPopup]      = useState(null);
  const [matchFlt,  setMatchFlt]   = useState("upcoming");
  const [teamMatchFilter, setTeamMatchFilter] = useState(null);
  const [showInst,  setShowInst]   = useState(false);
  const [pwaReady,  setPwaReady]   = useState(false);
  const [rev,       setRev]        = useState(0);
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent||"");
  const isAndroid=/android/i.test(navigator.userAgent||"");

  useEffect(function(){
    if(window.twemoji) {
      setTimeout(function(){
        try{ window.twemoji.parse(document.getElementById("root"), { folder:"svg", ext:".svg" }); }catch(e){}
      }, 0);
    }
  });

  useEffect(function(){
    // نراقب متى يتوفر الـ prompt (قد يكون تم بالفعل)
    if(_pwaPrompt) setPwaReady(true);
    window.addEventListener("beforeinstallprompt", function(e){
      e.preventDefault(); _pwaPrompt=e; setPwaReady(true);
    });
    try{
      const sa=window.matchMedia("(display-mode: standalone)").matches||(window.navigator.standalone===true);
      // الإغلاق مؤقت لهذه الجلسة فقط — يرجع البانر في كل زيارة ما دام التطبيق غير مثبت
      let dismissed=false;
      try{ dismissed=sessionStorage.getItem("wc_inst_dismissed")==="1"; }catch(e){}
      if(!sa && !dismissed) setTimeout(function(){setShowInst(true);},2000);
    }catch(e){}
    return function(){};
  },[]);
  const dismissInstall = function(){
    setShowInst(false);
    try{ sessionStorage.setItem("wc_inst_dismissed","1"); }catch(e){}
  };
  const isStandalone=(function(){try{return window.matchMedia("(display-mode: standalone)").matches||(window.navigator.standalone===true);}catch(e){return false;}})();
  /* التثبيت من البانر أو من زر الهيدر الدائم — إلغاء النافذة الأصلية لا يخفي شيئاً */
  const doInstall = async function(){
    if(_pwaPrompt) {
      try{
        _pwaPrompt.prompt();
        const choice = _pwaPrompt.userChoice ? await _pwaPrompt.userChoice.catch(function(){return null;}) : null;
        _pwaPrompt=null; setPwaReady(false);
        if(choice && choice.outcome==="accepted") dismissInstall();
      }catch(e){}
    } else {
      alert(isIOS
        ?"iPhone: اضغط زر المشاركة ثم Add to Home Screen"
        :"Android: افتح قائمة Chrome (⋮) ثم Install app أو Add to Home screen");
    }
  };

  useEffect(function(){ loadAll(); }, [rev]);
  const reload = () => setRev(function(r){return r+1;});

  /* مزامنة النتائج المباشرة من الكاش الخلفي + تحديث دوري */
  const refreshLive = async () => {
    const d = await callAPI("/fixtures?league=1&season=2026", LIVE_TTL);
    if(d && d.response) {
      const map = {};
      d.response.forEach(function(fx){
        if(fx.fixture && fx.fixture.id!=null) map[String(fx.fixture.id)] = {
          goals:fx.goals||{}, status:(fx.fixture.status||{}),
          homeName:(fx.teams&&fx.teams.home&&fx.teams.home.name)||"",
          awayName:(fx.teams&&fx.teams.away&&fx.teams.away.name)||""
        };
      });
      setLiveMap(map);
    }
  };
  useEffect(function(){
    refreshLive();
    // التحديث الخلفي مخزّن بالكاش — الاستعلام من هنا ما يستهلك من باقة الـ API
    const a = setInterval(function(){
      if(document.visibilityState==="visible") refreshLive();
    }, 2*60*1000);
    const b = setInterval(function(){
      if(document.visibilityState==="visible") loadAll();
    }, 5*60*1000);
    const onVis = function(){ if(document.visibilityState==="visible") refreshLive(); };
    document.addEventListener("visibilitychange", onVis);
    return function(){ clearInterval(a); clearInterval(b); document.removeEventListener("visibilitychange", onVis); };
  }, []);

  const loadAll = async () => {
    try {
      const [tRes,mRes,mpRes,apRes,fRes,cpRes,acpRes,prRes,r16Res,setRes] = await Promise.all([
        q(sb.from("teams").select("*")),
        q(sb.from("matches").select("*").order("match_utc")),
        q(sb.from("predictions").select("*").eq("user_id",profile.id)),
        q(sb.from("predictions").select("*")),
        q(sb.from("favorites").select("team_id").eq("user_id",profile.id)),
        q(sb.from("champion_predictions").select("*").eq("user_id",profile.id).maybeSingle()),
        q(sb.from("champion_predictions").select("*")),
        q(sb.from("profiles").select("id,display_name,username").eq("approved",true)),
        q(sb.from("matches").select("match_utc").eq("stage","R16").order("match_utc").limit(1)),
        q(sb.from("app_settings").select("*")),
      ]);

      let teamsMap = {};
      if(tRes.data) { tRes.data.forEach(function(x){teamsMap[x.id]=x;}); setTeams(teamsMap); }

      if(mRes.data) {
        const enriched = mRes.data.map(function(m){
          return Object.assign({},m,{team1:teamsMap[m.team1_id]||null,team2:teamsMap[m.team2_id]||null});
        });
        setMatches(enriched);
      }

      if(mpRes.data) {
        const mp = {};
        mpRes.data.forEach(function(x){mp[x.match_id]=x;});
        setMyPreds(mp);
      }

      if(apRes.data) setAllPreds(apRes.data);
      if(fRes.data) setFavs(new Set(fRes.data.map(function(x){return x.team_id;})));
      setMyChamp(cpRes.data||null);
      if(acpRes.data) setAllChamp(acpRes.data);
      if(prRes.data) setProfiles(prRes.data);
      if(r16Res.data && r16Res.data.length>0) setChampLock(new Date(r16Res.data[0].match_utc));

      if(setRes.data) {
        const cw = setRes.data.find(function(s){return s.key==="champion_winner";});
        if(cw && cw.value) setChampWin(cw.value);
        const sm={}; setRes.data.forEach(function(s){sm[s.key]=s.value;});
        setAppSettings(sm);
      }

      if(profile.is_admin) {
        const pRes = await q(sb.from("profiles").select("*").eq("approved",false));
        if(pRes.data) setPending(pRes.data);
      }
    } catch(e) {
      console.error("loadAll error:", String(e));
    }
  };

  const myPts = useMemo(function(){
    try {
      let pts=0;
      Object.values(myPreds).forEach(function(pred){
        const match = matches.find(function(m){return m.id===pred.match_id;});
        if(match) pts += (calcPts(pred,match)||0);
      });
      if(myChamp && champWin && myChamp.team_id===champWin) pts+=15;
      return pts;
    } catch(e){ return 0; }
  }, [myPreds,matches,myChamp,champWin]);

  const leaderboard = useMemo(function(){
    try {
      const byUser={};
      allPreds.forEach(function(p){
        if(!byUser[p.user_id]) byUser[p.user_id]=[];
        byUser[p.user_id].push(p);
      });
      return profiles.map(function(pr){
        let pts=0;
        (byUser[pr.id]||[]).forEach(function(pred){
          const match=matches.find(function(m){return m.id===pred.match_id;});
          if(match) pts+=(calcPts(pred,match)||0);
        });
        const cp=allChamp.find(function(c){return c.user_id===pr.id;});
        if(cp && champWin && cp.team_id===champWin) pts+=15;
        return Object.assign({},pr,{pts:pts,predCount:(byUser[pr.id]||[]).length});
      }).sort(function(a,b){return b.pts-a.pts;});
    } catch(e){ return []; }
  }, [profiles,allPreds,matches,allChamp,champWin]);

  const toggleFav = async (id) => {
    const nf = new Set(favs);
    if(nf.has(id)) {
      nf.delete(id);
      await q(sb.from("favorites").delete().eq("user_id",profile.id).eq("team_id",id));
    } else {
      nf.add(id);
      await q(sb.from("favorites").insert({user_id:profile.id,team_id:id}));
    }
    setFavs(nf);
  };

  const savePred = async (matchId, t1, t2) => {
    const v1=parseInt(t1,10), v2=parseInt(t2,10);
    if(isNaN(v1)||isNaN(v2)||v1<0||v2<0||v1>20||v2>20) return {success:false,error:"أدخل نتيجة صحيحة (0-20)"};
    const res = await q(sb.rpc("save_prediction",{p_match_id:matchId,p_pred_team1:v1,p_pred_team2:v2}));
    if(res.data && res.data.error) return {success:false,error:res.data.error};
    if(res.error) return {success:false,error:"تعذر الحفظ، حاول مرة ثانية"};
    const pr2 = await q(sb.from("predictions").select("*").eq("user_id",profile.id).eq("match_id",matchId).maybeSingle());
    if(pr2.data) setMyPreds(function(prev){const n=Object.assign({},prev);n[matchId]=pr2.data;return n;});
    return {success:true};
  };

  const saveChampion = async (teamId) => {
    const res = await q(sb.from("champion_predictions").upsert({user_id:profile.id,team_id:teamId},{onConflict:"user_id"}).select().single());
    if(res.data){ setMyChamp(res.data); return {success:true}; }
    const msg=String((res.error&&res.error.message)||"");
    return {success:false,error:msg.indexOf("انتهى")>=0?"انتهى وقت اختيار البطل — بدأ دور الـ16":"تعذر الحفظ، حاول مرة ثانية"};
  };

  const approveUser = async (uid, approved) => {
    if(approved) await q(sb.from("profiles").update({approved:true}).eq("id",uid));
    else await q(sb.from("profiles").delete().eq("id",uid));
    setPending(function(prev){return prev.filter(function(u){return u.id!==uid;});});
  };

  const setResult = async (matchId, r1, r2) => {
    await q(sb.from("matches").update({result_team1:parseInt(r1),result_team2:parseInt(r2),status:"finished"}).eq("id",matchId));
    await q(sb.rpc("calculate_match_points",{match_id_param:matchId}));
    reload();
  };

  const setChampWinner = async (teamId) => {
    await q(sb.from("app_settings").update({value:teamId}).eq("key","champion_winner"));
    setChampWin(teamId);
  };

  const syncAPI = async (setSyncMsg) => {
    setSyncMsg("جاري جلب البيانات من الخلفية...");
    const data = await callAPI("/fixtures?league=1&season=2026", 30*1000);
    if(!data){setSyncMsg("فشل — callAPI أعاد null. تأكد من clever-processor Edge Function");return;}
    if(!data.response){setSyncMsg("خطأ API: "+JSON.stringify(data.errors||data).slice(0,80));return;}
    setSyncMsg("مطابقة "+data.response.length+" مباراة...");
    let count=0;
    for(let i=0;i<data.response.length;i++){
      const fx=data.response[i];
      const hName=(fx.teams&&fx.teams.home&&fx.teams.home.name)||"";
      const aName=(fx.teams&&fx.teams.away&&fx.teams.away.name)||"";
      const m=matches.find(function(x){
        if(x.api_fixture_id) return false;
        const t1=TMAP[x.team1_id], t2=TMAP[x.team2_id];
        return (nmMatch(t1,hName)&&nmMatch(t2,aName)) || (nmMatch(t1,aName)&&nmMatch(t2,hName));
      });
      if(m){
        const r=await q(sb.from("matches").update({api_fixture_id:String(fx.fixture.id)}).eq("id",m.id));
        if(!r.error) count++;
      }
    }
    setSyncMsg(count>0?"تمت مزامنة "+count+" مباراة":"لا توجد مباريات جديدة للربط");
    if(count>0) reload();
  };

  /* سحب النتائج المنتهية من API واعتمادها (للأدمن) */
  const pullResults = async () => {
    const d = await callAPI("/fixtures?league=1&season=2026", 30*1000);
    if(!d||!d.response) return {error:"تعذر جلب البيانات من الخلفية"};
    const byId={};
    d.response.forEach(function(fx){ if(fx.fixture&&fx.fixture.id!=null) byId[String(fx.fixture.id)]=fx; });
    const found=[];
    matches.forEach(function(m){
      if(!m.api_fixture_id||m.status==="finished") return;
      const fx=byId[String(m.api_fixture_id)];
      if(!fx||!fx.fixture.status||fx.fixture.status.short!=="FT") return;
      let h=fx.goals&&fx.goals.home, a=fx.goals&&fx.goals.away;
      if(h==null||a==null) return;
      // تأكد من اتجاه الفريقين (home في API قد يكون team2 عندنا)
      const apiHome=(fx.teams&&fx.teams.home&&fx.teams.home.name)||"";
      if(TMAP[m.team2_id] && nmMatch(TMAP[m.team2_id],apiHome) && !(TMAP[m.team1_id]&&nmMatch(TMAP[m.team1_id],apiHome))){
        const t=h; h=a; a=t;
      }
      found.push({m:m,h:h,a:a});
    });
    return {found:found};
  };

  const applyResults = async (rows) => {
    for(let i=0;i<rows.length;i++){
      const r=rows[i];
      await q(sb.from("matches").update({result_team1:r.h,result_team2:r.a,status:"finished"}).eq("id",r.m.id));
      await q(sb.rpc("calculate_match_points",{match_id_param:r.m.id}));
    }
    reload();
  };

  const toggleSetting = async (key, labelTxt) => {
    const cur = appSettings[key]==="true";
    const res = await q(sb.from("app_settings").upsert({key:key,value:cur?"false":"true",label:labelTxt}));
    if(!res.error) setAppSettings(function(prev){const n=Object.assign({},prev);n[key]=cur?"false":"true";return n;});
    return !res.error;
  };

  const TABS = [
    {id:"home",  ic:"🏠",lb:"الرئيسية"},
    {id:"grps",  ic:"🌍",lb:"المجموعات"},
    {id:"match", ic:"📅",lb:"المباريات"},
    {id:"knock", ic:"⚡",lb:"الإقصائيات"},
    {id:"board", ic:"🏆",lb:"الترتيب"},
  ];
  if(profile.is_admin) TABS.push({id:"admin",ic:"⚙️",lb:"الإدارة"});

  return (
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:90}}>
      <header style={{background:"linear-gradient(180deg,#071a38,rgba(2,11,28,.97))",padding:"12px 16px 0",borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:200}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{fontSize:11.5,color:C.sub}}>مرحباً</div>
            <div style={{fontSize:14,fontWeight:700,color:C.gold}}>{profile.display_name}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:900}}>⚽ كأس العالم 2026</div>
            <div style={{fontSize:11.5,color:C.dim,marginTop:1}}>{APP_VERSION}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{fontSize:15,fontWeight:900,color:C.gold}}>🏅{myPts}</div>
            {!isStandalone&&<button onClick={doInstall} title="تثبيت التطبيق" style={{background:C.goldBg,border:"1px solid "+C.goldBdr,borderRadius:10,padding:"5px 9px",color:C.gold,fontSize:13.5,cursor:"pointer",fontFamily:"inherit"}}>📲</button>}
            <button onClick={function(){reload();refreshLive();}} style={{background:"rgba(255,255,255,.06)",border:"1px solid "+C.border,borderRadius:10,padding:"5px 9px",color:C.sub,fontSize:13.5,cursor:"pointer",fontFamily:"inherit"}}>🔄</button>
            <button onClick={signOut} style={{background:C.redBg,border:"1px solid "+C.redBdr,borderRadius:10,padding:"5px 10px",color:C.red,fontSize:11.5,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>خروج</button>
          </div>
        </div>
        <nav style={{display:"flex",overflowX:"auto"}}>
          {TABS.map(function(t){
            return (
              <button key={t.id} onClick={function(){setTab(t.id);}}
                style={{flexShrink:0,padding:"7px 10px 9px",background:"none",border:"none",cursor:"pointer",
                  color:tab===t.id?C.gold:C.sub,fontSize:11.5,fontFamily:"inherit",
                  fontWeight:tab===t.id?700:400,display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                  borderBottom:"2.5px solid "+(tab===t.id?C.gold:"transparent")}}>
                <span style={{fontSize:15}}>{t.ic}</span>{t.lb}
              </button>
            );
          })}
        </nav>
      </header>

      <main className="fu" key={tab} style={{padding:"0 14px",paddingTop:16}}>
        {tab==="home"  && <HomeTab profile={profile} myPts={myPts} matches={matches} myPreds={myPreds} favs={favs} myChamp={myChamp} teams={teams} champLock={champLock} liveMap={liveMap} onOpen={setPopup}/>}
        {tab==="grps"  && <GroupsTab matches={matches} teams={teams} favs={favs} toggleFav={toggleFav} myChamp={myChamp} saveChampion={saveChampion} champLock={champLock} onTeamMatches={function(id){setTeamMatchFilter(id);setMatchFlt("all");setTab("match");}}/>}
        {tab==="match" && <MatchesTab matches={matches} myPreds={myPreds} savePred={savePred} matchFlt={matchFlt} setMatchFlt={setMatchFlt} teamFilter={teamMatchFilter} setTeamFilter={setTeamMatchFilter} liveMap={liveMap} onOpen={setPopup}/>}
        {tab==="knock" && <KnockTab matches={matches.filter(function(m){return m.stage&&m.stage!=="group";})} allMatches={matches} teams={teams} myPreds={myPreds} liveMap={liveMap} onOpen={setPopup}/>}
        {tab==="board" && <BoardTab leaderboard={leaderboard} profile={profile} allPreds={allPreds} matches={matches}/>}
        {tab==="admin" && <AdminTab pending={pending} matches={matches} teams={teams} approveUser={approveUser} setResult={setResult} champWin={champWin} setChampWinner={setChampWinner} syncAPI={syncAPI} pullResults={pullResults} applyResults={applyResults} appSettings={appSettings} toggleSetting={toggleSetting} members={profiles}/>}
      </main>

      {showInst && (
        <div className="mobile-sheet" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(0deg,#071a38,#020b1c)",borderTop:"1px solid "+C.goldBdr,padding:"14px 16px 28px",zIndex:300,display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:32}}>⚽</div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700}}>تثبيت التطبيق</div>
            <div style={{fontSize:12.5,color:C.sub,marginTop:2}}>يفتح بملء الشاشة</div>
          </div>
          <button onClick={doInstall} style={{background:"linear-gradient(135deg,"+C.gold+",#d4940f)",border:"none",borderRadius:12,padding:"10px 18px",color:"#000",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
            {isIOS&&!pwaReady?"طريقة التثبيت":"تثبيت"}
          </button>
          <button onClick={dismissInstall} style={{background:"rgba(255,255,255,.08)",border:"1px solid "+C.border,borderRadius:10,width:32,height:32,color:C.sub,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>x</button>
        </div>
      )}

      {popup && <MatchPopup match={popup} myPred={myPreds[popup.id]} allPreds={allPreds} profiles={profiles} savePred={savePred} liveData={liveFor(popup,liveMap)} onClose={function(){setPopup(null);}}/>}
    </div>
  );
}
/* ═══════════════ HOME TAB ════════════════════════════════════ */
function HomeTab({profile,myPts,matches,myPreds,favs,myChamp,teams,champLock,liveMap,onOpen}) {
  const [cnt, setCnt] = useState({d:0,h:0,m:0,s:0,done:false});
  const [clock, setClock] = useState("--:--:--");
  const WC = new Date("2026-06-11T19:00:00Z");

  useEffect(function(){
    function tick(){
      const now=new Date();
      setClock(String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0")+":"+String(now.getSeconds()).padStart(2,"0"));
      const diff=WC-now;
      if(diff<=0){setCnt({done:true});return;}
      setCnt({d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000),s:Math.floor((diff%60000)/1000),done:false});
    }
    tick();
    const id=setInterval(tick,1000);
    return function(){clearInterval(id);};
  },[]);

  const nextFav = useMemo(function(){
    const seen=new Set(), res=[];
    Array.from(favs).forEach(function(tid){
      const next=matches.filter(function(m){
        return !isPast(m.match_utc)&&(m.team1_id===tid||m.team2_id===tid);
      }).sort(function(a,b){return new Date(a.match_utc)-new Date(b.match_utc);})[0];
      if(next&&!seen.has(next.id)){seen.add(next.id);res.push(next);}
    });
    return res.sort(function(a,b){return new Date(a.match_utc)-new Date(b.match_utc);});
  }, [matches,favs]);

  const champTeam = myChamp ? teams[myChamp.team_id] : null;
  const isChampLocked = new Date()>=champLock;

  /* المباراة القادمة في البطولة — ولو تعددت المباريات بنفس التوقيت تُعرض كلها */
  const nextUp = useMemo(function(){
    const upcoming=matches.filter(function(m){return !isPast(m.match_utc)&&m.status!=="finished";})
      .sort(function(a,b){return new Date(a.match_utc)-new Date(b.match_utc);});
    if(!upcoming.length) return [];
    const first=new Date(upcoming[0].match_utc).getTime();
    return upcoming.filter(function(m){return new Date(m.match_utc).getTime()===first;});
  }, [matches]);

  /* المباراة الجارية الآن (من الصافرة حتى ~130 دقيقة) — كلها إن تزامنت */
  const nowPlaying = useMemo(function(){
    const now=Date.now();
    return matches.filter(function(m){
      if(m.status==="finished") return false;
      const ko=new Date(m.match_utc).getTime();
      return now>=ko && now<ko+130*60*1000;
    }).sort(function(a,b){return new Date(a.match_utc)-new Date(b.match_utc);});
  }, [matches, clock]);

  return (
    <div>
      <div style={{textAlign:"center",marginBottom:8}}>
        <div style={{fontSize:11.5,color:C.sub}}>الوقت الآن · {tzName()}</div>
        <div style={{fontSize:20,fontWeight:800,color:C.gold}}>{clock}</div>
      </div>

      <div style={{background:"linear-gradient(135deg,rgba(240,182,42,.09),rgba(34,208,122,.04))",border:"1px solid "+C.goldBdr,borderRadius:20,padding:18,textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:12.5,color:C.gold,fontWeight:700,marginBottom:12}}>⏳ العد التنازلي للانطلاقة</div>
        {cnt.done ? <div style={{fontSize:20,fontWeight:900,color:C.green}}>البطولة انطلقت!</div> : (
          <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:10}}>
            {[{v:cnt.d,l:"يوم"},{v:cnt.h,l:"ساعة"},{v:cnt.m,l:"دقيقة"},{v:cnt.s,l:"ثانية"}].map(function(x){return (
              <div key={x.l} style={{textAlign:"center"}}>
                <div style={{background:"rgba(240,182,42,.15)",border:"1px solid rgba(240,182,42,.35)",borderRadius:10,padding:"8px 0",fontSize:20,fontWeight:900,color:C.gold,width:50}}>{String(x.v).padStart(2,"0")}</div>
                <div style={{fontSize:11.5,color:C.sub,marginTop:4}}>{x.l}</div>
              </div>
            );})}
          </div>
        )}
        {!cnt.done&&<div style={{fontSize:12.5,color:C.sub}}>المكسيك 🇲🇽 vs جنوب أفريقيا 🇿🇦 · <span style={{color:C.green,fontWeight:600}}>11 يونيو 2026</span></div>}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
        {[["🏅",myPts,"نقاطي"],["📝",Object.keys(myPreds).length,"توقعاتي"],["⭐",favs.size,"مفضّلتي"]].map(function(x){return (
          <div key={x[2]} style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"12px 0",textAlign:"center"}}>
            <div style={{fontSize:18}}>{x[0]}</div>
            <div style={{fontSize:22,fontWeight:900}}>{x[1]}</div>
            <div style={{fontSize:11.5,color:C.sub,marginTop:2}}>{x[2]}</div>
          </div>
        );})}
      </div>

      <div style={{background:champTeam?C.goldBg:C.card,border:"1px solid "+(champTeam?C.goldBdr:C.border),borderRadius:16,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:12.5,fontWeight:700,color:C.gold,marginBottom:4}}>🥇 توقع البطل · 15 نقطة</div>
          {champTeam ? (
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <TeamFlag team={champTeam} size={24}/>
              <span style={{fontSize:14,fontWeight:700}}>{champTeam.name_ar}</span>
            </div>
          ) : <div style={{fontSize:13.5,color:C.sub}}>{isChampLocked?"مغلق":"اختر من المجموعات"}</div>}
        </div>
      </div>

      {nowPlaying.length>0 && (
        <div style={{marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:8,color:C.red}}>🔴 المباراة الحالية{nowPlaying.length>1?" ("+nowPlaying.length+" بنفس التوقيت)":""}</div>
          {nowPlaying.map(function(m){
            const lv=liveFor(m,liveMap);
            const lvShort=lv&&lv.status&&lv.status.short;
            const s1=lv&&lv.goals&&lv.goals.home!=null?lv.goals.home:"–";
            const s2=lv&&lv.goals&&lv.goals.away!=null?lv.goals.away:"–";
            return (
              <div key={m.id} onClick={function(){onOpen(m);}} style={{background:C.redBg,border:"1px solid "+C.redBdr,borderRadius:14,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                  <TeamFlag team={m.team1} size={22}/>
                  <span style={{fontSize:12.5,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.team1&&m.team1.name_ar}</span>
                </div>
                <div style={{textAlign:"center",flexShrink:0}}>
                  <div style={{fontSize:11.5,color:C.red,fontWeight:900}}>● مباشر{lv&&lv.status&&lv.status.elapsed!=null?" "+lv.status.elapsed+"'":""}</div>
                  <div style={{background:"rgba(0,0,0,.3)",border:"1px solid "+C.redBdr,borderRadius:8,padding:"2px 10px",fontSize:15,fontWeight:900,color:"#fff",direction:"ltr",fontFamily:"Arial,sans-serif"}}>{s1} - {s2}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flex:1,justifyContent:"flex-end",minWidth:0}}>
                  <span style={{fontSize:12.5,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.team2&&m.team2.name_ar}</span>
                  <TeamFlag team={m.team2} size={22}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {nextUp.length>0 && (
        <div style={{marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>⏭️ المباراة القادمة{nextUp.length>1?" ("+nextUp.length+" بنفس التوقيت)":""}</div>
          {nextUp.map(function(m){
            const kd2=LD(m.match_utc), pred=myPreds[m.id];
            return (
              <div key={m.id} onClick={function(){onOpen(m);}} style={{background:C.card,border:"1px solid "+C.greenBdr,borderRadius:14,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                  <TeamFlag team={m.team1} size={22}/>
                  <span style={{fontSize:12.5,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.team1&&m.team1.name_ar}</span>
                </div>
                <div style={{textAlign:"center",flexShrink:0}}>
                  <div style={{fontSize:11.5,color:C.sub}}>{fd(kd2)}</div>
                  <div style={{background:C.greenBg,border:"1px solid "+C.greenBdr,borderRadius:8,padding:"2px 8px",fontSize:14,fontWeight:900,color:C.green}}>{ft(kd2)}</div>
                  {pred&&<div style={{fontSize:11.5,color:C.green,marginTop:1}}>توقعي: {pred.pred_team1}-{pred.pred_team2}</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flex:1,justifyContent:"flex-end",minWidth:0}}>
                  <span style={{fontSize:12.5,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.team2&&m.team2.name_ar}</span>
                  <TeamFlag team={m.team2} size={22}/>

        </div>
      )}

      {nextFav.length>0 && (
        <div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>⭐ المباراة القادمة لكل منتخباتي ({nextFav.length})</div>
          {nextFav.map(function(m){
            const kd=LD(m.match_utc), pred=myPreds[m.id];
            return (
              <div key={m.id} onClick={function(){onOpen(m);}} style={{background:C.card,border:"1px solid "+C.goldBdr,borderRadius:14,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                  <TeamFlag team={m.team1} size={22}/>
                  <span style={{fontSize:12.5,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.team1&&m.team1.name_ar}</span>
                </div>
                <div style={{textAlign:"center",flexShrink:0}}>
                  <div style={{fontSize:11.5,color:C.sub}}>{fd(kd)}</div>
                  <div style={{background:C.goldBg,border:"1px solid "+C.goldBdr,borderRadius:8,padding:"2px 8px",fontSize:14,fontWeight:900,color:C.gold}}>{ft(kd)}</div>
                  {pred&&<div style={{fontSize:11.5,color:C.green,marginTop:1}}>توقعي: {pred.pred_team1}-{pred.pred_team2}</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flex:1,justifyContent:"flex-end",minWidth:0}}>
                  <span style={{fontSize:12.5,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.team2&&m.team2.name_ar}</span>
                  <TeamFlag team={m.team2} size={22}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {favs.size===0 && <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:16,textAlign:"center",color:C.sub,fontSize:13.5}}>اختر منتخباتك من تبويب المجموعات ⭐</div>}

      <div style={{fontSize:14,fontWeight:700,marginBottom:8,marginTop:16}}>🌙 المنتخبات العربية</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {Object.values(teams).filter(function(t){return t.is_arab;}).sort(function(a,b){return String(a.group_id).localeCompare(String(b.group_id));}).map(function(t){return (
          <div key={t.id} style={{background:C.goldBg,border:"1px solid "+C.goldBdr,borderRadius:14,padding:"10px 13px",display:"flex",alignItems:"center",gap:9}}>
            <TeamFlag team={t} size={24}/>
            <div>
              <div style={{fontSize:13.5,fontWeight:700,color:C.gold}}>{t.name_ar}</div>
              <div style={{fontSize:11.5,color:C.sub}}>المجموعة {t.group_id}</div>
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

/* ═══════════════ GROUPS TAB ══════════════════════════════════ */
function GroupsTab({matches,teams,favs,toggleFav,myChamp,saveChampion,champLock,onTeamMatches}) {
  const [saving,setSaving] = useState(null);
  const [ok,setOk] = useState(false);
  const [champErr,setChampErr] = useState("");
  const isChampLocked = new Date()>=champLock;
  const standings = useMemo(function(){return calcStandings(matches,teams);},[matches,teams]);
  const gids = Object.keys(standings).sort();

  const pickChamp = async (teamId) => {
    if(isChampLocked) return;
    setSaving(teamId); setChampErr("");
    const res = await saveChampion(teamId);
    setSaving(null);
    if(res&&res.success){ setOk(true); setTimeout(function(){setOk(false);},2000); }
    else { setChampErr((res&&res.error)||"تعذر الحفظ"); setTimeout(function(){setChampErr("");},4000); }
  };

  return (
    <div>
      <div style={{background:isChampLocked?C.card:C.goldBg,border:"1px solid "+(isChampLocked?C.border:C.goldBdr),borderRadius:16,padding:"12px 16px",marginBottom:14}}>
        <div style={{fontSize:13.5,fontWeight:700,color:C.gold}}>🥇 اختر بطل البطولة · 15 نقطة</div>
        <div style={{fontSize:12.5,color:C.sub,marginTop:4}}>
          {isChampLocked ? "مغلق" : myChamp ? ("اختيارك: "+(teams[myChamp.team_id]&&teams[myChamp.team_id].name_ar)) : "اضغط على أي منتخب"}
        </div>
      </div>
      {ok && <div style={{background:C.greenBg,border:"1px solid "+C.greenBdr,borderRadius:12,padding:"10px 16px",marginBottom:12,textAlign:"center",color:C.green,fontWeight:700,fontSize:14}}>تم الحفظ!</div>}
      {champErr && <div style={{background:C.redBg,border:"1px solid "+C.redBdr,borderRadius:12,padding:"10px 16px",marginBottom:12,textAlign:"center",color:C.red,fontWeight:700,fontSize:14}}>{champErr}</div>}

      {gids.map(function(gid){
        const rows=standings[gid]||[];
        return (
          <div key={gid} style={{marginBottom:18}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{background:C.goldBg,border:"1px solid "+C.goldBdr,borderRadius:8,padding:"2px 10px",fontSize:12.5,fontWeight:800,color:C.gold}}>المجموعة {gid}</div>
              {rows.some(function(r){return r.team.is_arab;}) && <span>🌙</span>}

/* ═══════════════ MATCHES TAB ══════════════════════════════════ */
function MatchesTab({matches,myPreds,savePred,matchFlt,setMatchFlt,teamFilter,setTeamFilter,liveMap,onOpen}) {
  const [arabOnly,setArabOnly] = useState(false);

  const isCurrent = function(m){
    if(m.status==="finished") return false;
    const diff=new Date(m.match_utc)-new Date();
    return diff>-120*60*1000 && diff<8*60*60*1000;
  };

  const filteredTeam = teamFilter && matches.find(function(m){return m.team1_id===teamFilter||m.team2_id===teamFilter;});
  const filterName = filteredTeam && (filteredTeam.team1_id===teamFilter?filteredTeam.team1&&filteredTeam.team1.name_ar:filteredTeam.team2&&filteredTeam.team2.name_ar);

  const shown = matches.filter(function(m){
    const st = matchFlt==="current"?isCurrent(m):matchFlt==="upcoming"?m.status!=="finished"&&!isPast(m.match_utc):matchFlt==="finished"?m.status==="finished":true;
    const ar = !arabOnly||(m.team1&&m.team1.is_arab)||(m.team2&&m.team2.is_arab);
    const tf = !teamFilter || m.team1_id===teamFilter || m.team2_id===teamFilter;
    return st&&ar&&tf;
  });

  const byDate = {};
  shown.forEach(function(m){const k=dk(LD(m.match_utc));if(!byDate[k])byDate[k]=[];byDate[k].push(m);});
  const dates = Object.keys(byDate).sort();

  return (
    <div>

        {[["current","🔴 الحالية"],["upcoming","القادمة"],["finished","المنتهية"],["all","الكل"]].map(function(x){return (
          <button key={x[0]} onClick={function(){setMatchFlt(x[0]);}} style={{flex:1,padding:"7px 0",borderRadius:20,border:"1px solid "+(matchFlt===x[0]?C.gold:C.border),background:matchFlt===x[0]?C.goldBg:C.card,color:matchFlt===x[0]?C.gold:C.sub,fontSize:11.5,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{x[1]}</button>
        );})}
      </div>
      <button onClick={function(){setArabOnly(!arabOnly);}} style={{width:"100%",padding:"7px",borderRadius:20,border:"1px solid "+(arabOnly?C.goldBdr:C.border),background:arabOnly?C.goldBg:C.card,color:arabOnly?C.gold:C.sub,fontSize:12.5,fontWeight:arabOnly?700:400,cursor:"pointer",fontFamily:"inherit",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        <span>🌙</span>{arabOnly?"المنتخبات العربية فقط":"فلتر العربية"}
      </button>
      {teamFilter&&<button onClick={function(){setTeamFilter(null);}} style={{width:"100%",padding:"8px",borderRadius:20,border:"1px solid "+C.blueBdr,background:C.blueBg,color:C.blue,fontSize:13.5,fontWeight:800,cursor:"pointer",fontFamily:"inherit",marginBottom:12}}>
        عرض مباريات {filterName||"المنتخب"} فقط · اضغط لإلغاء الفلتر
      </button>}
      {shown.length===0 && <div style={{textAlign:"center",padding:40,color:C.sub}}>لا توجد مباريات</div>}
      {dates.map(function(d){
        const kd2=LD(byDate[d][0].match_utc);
        return (
          <div key={d}>
            <div style={{display:"flex",alignItems:"center",gap:10,margin:"12px 0 8px"}}>
              <div style={{background:C.gold,borderRadius:10,padding:"3px 12px",fontSize:13.5,fontWeight:800,color:"#000",flexShrink:0}}>{fd(kd2)}</div>
              <div style={{fontSize:12.5,color:C.sub}}>{fw(kd2)}</div>
              <div style={{flex:1,height:1,background:C.border}}/>
            </div>
            {byDate[d].map(function(m){return <MatchRow key={m.id} match={m} pred={myPreds[m.id]} savePred={savePred} live={liveFor(m,liveMap)} onOpen={onOpen}/>;})
            }

    </div>
  );
}

/* ═══════════════ MATCH ROW ════════════════════════════════════ */
function MatchRow({match,pred,savePred,live,onOpen}) {
  const [p1,setP1] = useState(pred!=null?String(pred.pred_team1):"");
  const [p2,setP2] = useState(pred!=null?String(pred.pred_team2):"");
  const [busy,setBusy] = useState(false);
  const [ok,setOk] = useState(false);
  const [errMsg,setErrMsg] = useState("");

  useEffect(function(){ if(pred!=null){setP1(String(pred.pred_team1));setP2(String(pred.pred_team2));} },[pred]);

  const locked=isLocked(match.match_utc), finished=match.status==="finished";
  const kd=LD(match.match_utc), pts=pred?calcPts(pred,match):null;
  const canSave=!busy&&p1!==""&&p2!=="";

  const lvShort=live&&live.status&&live.status.short;
  const lvNow=!finished&&isLiveShort(lvShort);
  const lvH=live&&live.goals&&live.goals.home!=null?live.goals.home:null;
  const lvA=live&&live.goals&&live.goals.away!=null?live.goals.away:null;
  const dispH=match.result_team1!=null?match.result_team1:lvH;
  const dispA=match.result_team2!=null?match.result_team2:lvA;
  const hasScore=dispH!=null&&dispA!=null;

  const doSave=async function(e){
    e.stopPropagation();
    if(!canSave) return;
    setBusy(true);
    const res=await savePred(match.id,p1,p2);
    setBusy(false);
    if(res&&res.success){setOk(true);setTimeout(function(){setOk(false);},2500);}
    else if(res&&res.error){setErrMsg(res.error);setTimeout(function(){setErrMsg("");},4000);}
  };

  const numBox=function(v,set){return (
    <input type="number" inputMode="numeric" min="0" max="20" value={v} onChange={function(e){set(clampScore(e.target.value));}} onClick={function(e){e.stopPropagation();}} disabled={locked||finished}
      style={{width:44,height:44,textAlign:"center",fontSize:20,fontWeight:900,background:"rgba(255,255,255,.09)",border:"1px solid "+(locked||finished?C.border:C.gold),borderRadius:9,color:C.text,fontFamily:"inherit",outline:"none"}}/>

    <div onClick={function(){onOpen(match);}} style={{background:finished?"rgba(255,255,255,.02)":C.card,border:"1px solid "+(lvNow?C.redBdr:finished?C.border:C.goldBdr),borderRadius:16,padding:"11px 13px",marginBottom:10,cursor:"pointer"}}>

            {match.stage&&match.stage!=="group"?STAGES[match.stage]:"المجموعة "+match.group_id}
          </span>
          {lvNow&&<span style={{background:C.redBg,border:"1px solid "+C.redBdr,borderRadius:6,padding:"1px 7px",fontSize:11.5,color:C.red,fontWeight:800}}>● مباشر{live.status.elapsed!=null?" "+live.status.elapsed+"'":""}</span>}
          {pred&&!finished&&<span style={{fontSize:11.5,color:C.gold}}>✓</span>}
        </div>
        <div style={{textAlign:"left"}}>
          {finished?<span style={{fontSize:11.5,color:C.sub}}>انتهت</span>
           :lvNow?<span style={{fontSize:11.5,color:C.red,fontWeight:800}}>جارية</span>
           :locked?<span style={{fontSize:11.5,color:C.red,fontWeight:700}}>🔒</span>
           :<span style={{fontSize:14,fontWeight:900,color:C.green}}>{ft(kd)}</span>}
          <div style={{fontSize:11.5,color:C.dim}}>{fd(kd)}</div>
        </div>

      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}>
          <TeamFlag team={match.team1} size={27}/>
          <span style={{fontSize:14,fontWeight:900,lineHeight:1.25,color:match.team1&&match.team1.is_arab?C.gold:C.text,whiteSpace:"normal",overflow:"visible",wordBreak:"normal"}}>{match.team1&&match.team1.name_ar}</span>
        </div>
        <div style={{flexShrink:0,textAlign:"center",minWidth:86}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5,marginBottom:6}}>

           :<div style={{display:"flex",alignItems:"center",gap:5}}>{numBox(p1,setP1)}<span style={{fontSize:13.5,color:C.dim}}>توقع</span>{numBox(p2,setP2)}</div>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flex:1,justifyContent:"flex-end",minWidth:0,textAlign:"left"}}>
          <span style={{fontSize:14,fontWeight:900,lineHeight:1.25,color:match.team2&&match.team2.is_arab?C.gold:C.text,whiteSpace:"normal",overflow:"visible",wordBreak:"normal"}}>{match.team2&&match.team2.name_ar}</span>
          <TeamFlag team={match.team2} size={27}/>

          {pts!=null&&<span style={{color:pts===3?C.green:pts===1?C.gold:C.red,fontWeight:700}}>{pts===3?"🏆 3 نقاط":pts===1?"👍 نقطة":"❌ صفر"}</span>}
        </div>
      )}
      <div style={{marginTop:8,textAlign:"center",fontSize:11.5,color:C.blue,fontWeight:900}}>اضغط على البطاقة لفتح التفاصيل</div>
      {!finished&&!locked&&(
        <button onClick={doSave} disabled={!canSave} style={{width:"100%",marginTop:9,padding:"8px",background:ok?C.greenBg:C.goldBg,border:"1px solid "+(ok?C.greenBdr:C.goldBdr),borderRadius:10,color:ok?C.green:C.gold,fontSize:13.5,fontWeight:700,cursor:canSave?"pointer":"not-allowed",fontFamily:"inherit",opacity:canSave?1:0.5}}>
          {ok?"✅ تم":busy?"...":pred?"🔄 تحديث":"💾 حفظ"}

      {errMsg&&<div style={{marginTop:6,textAlign:"center",fontSize:12.5,color:C.red,fontWeight:700}}>{errMsg}</div>}
    </div>
  );
}

function KnockTab({matches,allMatches,teams,myPreds,liveMap,onOpen}) {

  const PLAN={

      {no:86,a:"1J",b:"2H",date:"2026-07-03T22:00:00Z",venue:"AT&T Stadium"},
      {no:87,a:"1K",b:"3DEIJL",date:"2026-07-04T01:30:00Z",venue:"Hard Rock Stadium"},
      {no:88,a:"2D",b:"2G",date:"2026-07-03T18:00:00Z",venue:"GEHA Field at Arrowhead Stadium"}
    ],
    R16:[
      {no:89,a:"W74",b:"W77",date:"2026-07-04T21:00:00Z"},{no:90,a:"W73",b:"W75",date:"2026-07-04T17:00:00Z"},
      {no:91,a:"W76",b:"W78",date:"2026-07-05T20:00:00Z"},{no:92,a:"W79",b:"W80",date:"2026-07-06T02:00:00Z"},
      {no:93,a:"W83",b:"W84",date:"2026-07-06T19:00:00Z"},{no:94,a:"W81",b:"W82",date:"2026-07-07T00:00:00Z"},
      {no:95,a:"W86",b:"W88",date:"2026-07-07T16:00:00Z"},{no:96,a:"W85",b:"W87",date:"2026-07-07T20:00:00Z"}
    ],
    QF:[
      {no:97,a:"W89",b:"W90",date:"2026-07-09T20:00:00Z"},{no:98,a:"W93",b:"W94",date:"2026-07-10T19:00:00Z"},
      {no:99,a:"W91",b:"W92",date:"2026-07-11T21:00:00Z"},{no:100,a:"W95",b:"W96",date:"2026-07-12T01:00:00Z"}
    ],
    SF:[{no:101,a:"W97",b:"W98",date:"2026-07-14T19:00:00Z"},{no:102,a:"W99",b:"W100",date:"2026-07-15T19:00:00Z"}],
    TH:[{no:103,a:"L101",b:"L102",date:"2026-07-18T21:00:00Z"}],
    F:[{no:104,a:"W101",b:"W102",date:"2026-07-19T19:00:00Z",venue:"New York New Jersey Stadium"}]
  };
  const bys={};
  matches.forEach(function(m){const s=m.stage||"R32";if(!bys[s])bys[s]=[];bys[s].push(m);});
  const standings = calcStandings(allMatches||[], teams||{});
  const thirds = Object.keys(standings).map(function(g){return standings[g]&&standings[g][2];}).filter(Boolean).sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
  const placeholderTeam=function(name){return {id:null,flag:"🏳️",name_ar:name,is_arab:false};};
  const slotLabel=function(slot){
    if(slot[0]==="W") return "الفائز من مباراة "+slot.slice(1);
    if(slot[0]==="L") return "الخاسر من مباراة "+slot.slice(1);
    if(slot[0]==="1") return "متصدر المجموعة "+slot.slice(1);
    if(slot[0]==="2") return "وصيف المجموعة "+slot.slice(1);
    if(slot[0]==="3") return "أفضل ثالث من "+slot.slice(1).split("").join("/");
    return slot;
  };
  /* تخصيص أفضل 8 ثوالث على المقاعد بمطابقة قصوى (Kuhn) ملتزمة بحروف جدول الفيفا،
     وأي مقعد متبقٍ يُعبأ بأفضل ثالث متبقٍ حتى لا يبقى مقعد فارغ بينما البقية معبأة
     (الكل يظهر باهتاً لحين الاعتماد الرسمي) */
  const thirdSlots = PLAN.R32.flatMap(function(x){return [x.a,x.b];}).filter(function(s){return s[0]==="3";});
  const thirdAssign = (function(){
    const best8 = thirds.slice(0,8);
    const matchOf = {};   // slot index -> team index
    const ownerOf = {};   // team index -> slot index
    const tryAssign = function(si, visited){
      const allowed = thirdSlots[si].slice(1).split("");
      for(let j=0;j<best8.length;j++){
        if(visited.has(j)) continue;
        if(!allowed.includes(best8[j].team.group_id)) continue;
        visited.add(j);
        if(ownerOf[j]===undefined || tryAssign(ownerOf[j], visited)){
          ownerOf[j]=si; matchOf[si]=j;
          return true;
        }
      }
      return false;
    };
    for(let si=0;si<thirdSlots.length;si++) tryAssign(si, new Set());
    const result = {};
    const leftovers = best8.map(function(_,j){return j;}).filter(function(j){return ownerOf[j]===undefined;});
    thirdSlots.forEach(function(slot,si){
      if(matchOf[si]!==undefined) result[slot]=best8[matchOf[si]].team;
      else { const j=leftovers.shift(); result[slot]=j!==undefined?best8[j].team:null; }
    });
    return result;
  })();
  const slotTeam=function(slot){
    if(slot[0]==="1"||slot[0]==="2"){
      const g=slot.slice(1), idx=slot[0]==="1"?0:1;
      return standings[g]&&standings[g][idx]?standings[g][idx].team:placeholderTeam(slotLabel(slot));
    }
    if(slot[0]==="3"){
      return thirdAssign[slot]||placeholderTeam(slotLabel(slot));
    }
    return placeholderTeam(slotLabel(slot));
  };
  const toSynthetic=function(x,stage){
    const t1=slotTeam(x.a), t2=slotTeam(x.b);
    return {id:"ko-"+x.no,is_placeholder:true,stage:stage,match_no:x.no,match_utc:x.date,status:"scheduled",venue:x.venue,team1_id:t1.id,team2_id:t2.id,team1:t1,team2:t2,slot_a:x.a,slot_b:x.b};
  };
  const stageList=function(s){return (bys[s]&&bys[s].length?bys[s]:PLAN[s].map(function(x){return toSynthetic(x,s);}));};
  const [viewMode,setViewMode] = useState("tree"); // tree (شجرة هرمية) | chrono (زمني)
  const [chronoStage,setChronoStage] = useState("all"); // فلتر الدور في العرض الزمني
  const curMatches = SO.flatMap(stageList)
    .filter(function(m){return chronoStage==="all"||m.stage===chronoStage;})
    .sort(function(a,b){return new Date(a.match_utc)-new Date(b.match_utc);});

  /* ترتيب المقاعد في الشجرة حسب مسار الإقصاء الرسمي: كل مباراة تتغذى من المباراتين المجاورتين في العمود السابق */
  const BR_ORDER = {R32:[74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87], R16:[89,90,93,94,91,92,95,96], QF:[97,98,99,100], SF:[101,102], F:[104], TH:[103]};
  const treeStage = function(s){
    const synth = PLAN[s].map(function(x){return toSynthetic(x,s);});
    const real = (bys[s]||[]).slice().sort(function(a,b){return new Date(a.match_utc)-new Date(b.match_utc);});
    if(real.length){
      // نطابق صفوف قاعدة البيانات على مقاعد خطة الفيفا حسب الترتيب الزمني
      const synthSorted = synth.slice().sort(function(a,b){return new Date(a.match_utc)-new Date(b.match_utc);});
      synthSorted.forEach(function(sy,i){ if(real[i]) sy.real = Object.assign({},real[i],{match_no:sy.match_no}); });
    }
    const byNo={}; synth.forEach(function(sy){ byNo[sy.match_no]=sy.real||sy; });
    return BR_ORDER[s].map(function(no){return byNo[no];}).filter(Boolean);
  };

  const MiniCard = function({m,style:st}){
    const finished=m.status==="finished";
    const lv=liveFor(m,liveMap);
    const lvNow=!finished&&lv&&lv.status&&isLiveShort(lv.status.short);
    const s1=finished?m.result_team1:(lvNow&&lv.goals&&lv.goals.home!=null?lv.goals.home:null);
    const s2=finished?m.result_team2:(lvNow&&lv.goals&&lv.goals.away!=null?lv.goals.away:null);
    const kd=LD(m.match_utc), pred=myPreds[m.id];
    const trow=function(team,sc,winner){
      return (
        <div style={{display:"flex",alignItems:"center",gap:4,minWidth:0,height:17}}>
          <TeamFlag team={team} size={11}/>
          <span style={{flex:1,minWidth:0,fontSize:10,fontWeight:winner?900:700,color:winner?C.green:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",opacity:m.is_placeholder?0.55:1}}>{team?team.name_ar:"؟"}</span>
          <span style={{fontSize:10.5,fontWeight:900,color:lvNow?C.red:C.gold,width:14,textAlign:"center",flexShrink:0}}>{sc!=null?sc:"–"}</span>
        </div>
      );
    };
    return (
      <div onClick={function(){onOpen(m);}} style={Object.assign({height:58,background:finished?"rgba(255,255,255,.03)":C.card,border:"1px solid "+(lvNow?C.redBdr:m.is_placeholder?C.border:C.blueBdr),borderRadius:10,padding:"4px 6px",cursor:"pointer",boxSizing:"border-box",overflow:"hidden"},st)}>
        {trow(m.team1,s1,finished&&m.result_team1>m.result_team2)}
        {trow(m.team2,s2,finished&&m.result_team2>m.result_team1)}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:8.5,color:C.dim,marginTop:1}}>
          <span>{fd(kd)}</span>
          <span style={{color:lvNow?C.red:C.dim,fontWeight:lvNow?900:400}}>{lvNow?"● مباشر":finished?"انتهت":ft(kd)}</span>
          {pred?<span style={{color:C.gold,fontWeight:900}}>✓</span>:<span/>}
        </div>
      </div>
    );
  };

  const BracketTree = function(){
    const colStages=["R32","R16","QF","SF","F"];
    const cols=colStages.map(treeStage);
    const th=treeStage("TH")[0];
    const CW=116, CH=58, GAP=22, COLW=CW+GAP, TOP=30, BH=16*66, W=colStages.length*COLW-GAP;
    const yOf=function(c,i){ const n=cols[c].length||1; const slot=BH/n; return TOP+i*slot+(slot-CH)/2; };
    const xLeft=function(c){ return W-c*COLW-CW; }; // إحداثيات يسارية للـ SVG
    const paths=[];
    for(let c=0;c<cols.length-1;c++){
      cols[c].forEach(function(_,i){
        const x1=xLeft(c), y1=yOf(c,i)+CH/2;
        const xm=x1-GAP/2;
        const y2=yOf(c+1,Math.floor(i/2))+CH/2;
        const x2=xLeft(c+1)+CW;
        paths.push("M"+x1+" "+y1+" H"+xm+" V"+y2+" H"+x2);
      });
    }
    const labels=["دور الـ٣٢","دور الـ١٦","ربع النهائي","نصف النهائي","النهائي"];
    return (
      <div dir="rtl" style={{overflowX:"auto",paddingBottom:8,WebkitOverflowScrolling:"touch"}}>
        <div style={{position:"relative",width:W,height:BH+TOP+170}}>
          <svg width={W} height={BH+TOP} style={{position:"absolute",top:0,left:0,pointerEvents:"none"}}>
            {paths.map(function(d,i){return <path key={i} d={d} fill="none" stroke="rgba(122,179,255,.4)" strokeWidth="1.5"/>;})}
          </svg>
          {labels.map(function(lb,c){return (
            <div key={lb} style={{position:"absolute",right:c*COLW,top:0,width:CW,textAlign:"center",fontSize:11,fontWeight:900,color:C.blue,background:C.blueBg,border:"1px solid "+C.blueBdr,borderRadius:8,padding:"3px 0"}}>{lb}</div>
          );})}
          {cols.map(function(list,c){return list.map(function(m,i){
            return <MiniCard key={m.id} m={m} style={{position:"absolute",right:c*COLW,top:yOf(c,i),width:CW}}/>;
          });})}
          {th&&(
            <div style={{position:"absolute",right:(colStages.length-1)*COLW,top:TOP+BH/2+100,width:CW}}>
              <div style={{fontSize:10,color:C.sub,textAlign:"center",marginBottom:4,fontWeight:800}}>🥉 المركز الثالث</div>
              <MiniCard m={th} style={{width:CW}}/>
            </div>
          )}
        </div>
      </div>
    );
  };

  return (
    <div>
      {/* View toggle: شجرة هرمية ⇄ عرض زمني */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <button onClick={function(){setViewMode(viewMode==="tree"?"chrono":"tree");}} style={{flexShrink:0,padding:"7px 14px",borderRadius:12,border:"1px solid "+C.goldBdr,background:C.goldBg,color:C.gold,fontSize:13.5,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
          {viewMode==="tree"?"📅 عرض زمني":"🏆 شجرة المواجهات"}
        </button>
        <div style={{flex:1,alignSelf:"center",fontSize:12.5,color:C.sub}}>{viewMode==="tree"?"شجرة هرمية — اسحب يميناً ويساراً":"كل المواجهات مرتبة بالتاريخ"}</div>
      </div>

      {/* Bracket header */}
      <div style={{background:C.blueBg,border:"1px solid "+C.blueBdr,borderRadius:14,padding:"10px 14px",marginBottom:12,textAlign:"center"}}>
        <div style={{fontSize:14,fontWeight:800,color:C.blue}}>{viewMode==="tree"?"شجرة الأدوار الإقصائية":"الأدوار الإقصائية كاملة"}</div>
        <div style={{fontSize:12.5,color:C.sub,marginTop:2}}>المنتخب الباهت = تأهل افتراضي حسب الترتيب الحالي، ويثبت بعد الاعتماد الرسمي · اضغط أي مباراة للتفاصيل</div>
      </div>

      {viewMode==="tree"&&<BracketTree/>}

      {/* فلتر الأدوار في العرض الزمني */}
      {viewMode==="chrono"&&<div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:4}}>
        {[["all","الكل"]].concat(SO.map(function(s){return [s,STAGES[s]||s];})).map(function(x){return (
          <button key={x[0]} onClick={function(){setChronoStage(x[0]);}} style={{flexShrink:0,padding:"6px 12px",borderRadius:20,border:"1px solid "+(chronoStage===x[0]?C.blue:C.border),background:chronoStage===x[0]?C.blueBg:C.card,color:chronoStage===x[0]?C.blue:C.sub,fontSize:12.5,fontWeight:chronoStage===x[0]?700:400,cursor:"pointer",fontFamily:"inherit"}}>
            {x[1]}
          </button>
        );})}
      </div>}

      {/* القائمة الزمنية */}
      {viewMode==="chrono"&&curMatches.map(function(m){
        const kd=LD(m.match_utc), pred=myPreds[m.id];
        const pts=pred?calcPts(pred,m):null;
        const finished=m.status==="finished";
        const lv=liveFor(m,liveMap);
        const lvNow=!finished&&lv&&lv.status&&isLiveShort(lv.status.short);
        return (
          <React.Fragment key={m.id}>
          <div onClick={function(){onOpen(m);}} style={{position:"relative",background:finished?"rgba(255,255,255,.02)":C.card,border:"1px solid "+(finished?C.border:C.blueBdr),borderRadius:16,padding:"12px 14px",marginBottom:10,cursor:"pointer",boxShadow:m.is_placeholder?"inset 0 0 0 1px rgba(255,255,255,.02)":"0 8px 22px rgba(34,208,122,.08)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",gap:5}}>
                <span style={{fontSize:11.5,color:C.blue,fontWeight:800}}>مباراة {m.match_no||m.id}</span>
                <span style={{fontSize:11.5,color:C.sub}}>· {STAGES[m.stage]||m.stage}</span>
                {pred&&<span style={{fontSize:11.5,color:C.gold}}>✓ توقع</span>}
              </div>
              <div style={{textAlign:"left"}}>
                {finished?<span style={{fontSize:11.5,color:C.sub}}>انتهت</span>
                 :lvNow?<span style={{fontSize:11.5,color:C.red,fontWeight:800}}>● مباشر{lv.status.elapsed!=null?" "+lv.status.elapsed+"'":""}</span>
                 :<span style={{fontSize:13.5,fontWeight:700,color:C.green}}>{ft(kd)}</span>}
                <div style={{fontSize:11.5,color:C.dim}}>{fd(kd)}</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                <TeamFlag team={m.team1} size={25}/>
                <span style={{fontSize:14,fontWeight:800,lineHeight:1.25,color:m.team1&&m.team1.is_arab?C.gold:C.text,whiteSpace:"normal",overflow:"visible",opacity:m.is_placeholder?0.5:1}}>{m.team1?m.team1.name_ar:"؟"}</span>
              </div>
              <div style={{textAlign:"center",flexShrink:0,minWidth:60}}>
                {finished?<div style={{fontSize:20,fontWeight:900,letterSpacing:2}}>{m.result_team1} - {m.result_team2}</div>
                 :lvNow&&lv.goals&&lv.goals.home!=null?<div style={{fontSize:20,fontWeight:900,letterSpacing:2,color:C.red}}>{lv.goals.home} - {lv.goals.away}</div>
                 :<div style={{fontSize:12.5,color:C.dim}}>VS</div>}
                {pred&&finished&&pts!=null&&<div style={{fontSize:11.5,fontWeight:700,color:pts===3?C.green:pts===1?C.gold:C.red}}>{pts===3?"🏆":pts===1?"👍":"❌"}</div>}
              </div>
              <div style={{flex:1,display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end",minWidth:0}}>
                <span style={{fontSize:14,fontWeight:800,lineHeight:1.25,color:m.team2&&m.team2.is_arab?C.gold:C.text,whiteSpace:"normal",overflow:"visible",textAlign:"left",opacity:m.is_placeholder?0.5:1}}>{m.team2?m.team2.name_ar:"؟"}</span>
                <TeamFlag team={m.team2} size={25}/>
              </div>
            </div>
            {pred&&<div style={{marginTop:8,textAlign:"center",fontSize:11.5,color:C.gold}}>توقعك: {pred.pred_team1} - {pred.pred_team2}</div>}
            {m.is_placeholder&&<div style={{marginTop:6,fontSize:11.5,color:C.gold,paddingTop:6,borderTop:"1px solid "+C.border}}>معاينة للمسار الرسمي، وتتحول لمباراة توقعات بعد اعتمادها في الجدول</div>}
            {m.venue&&<div style={{marginTop:6,fontSize:11.5,color:C.dim,paddingTop:6,borderTop:"1px solid "+C.border}}>📍 {m.venue}</div>}
            <div style={{marginTop:8,textAlign:"center",fontSize:11.5,color:C.blue,fontWeight:900}}>اضغط على البطاقة لفتح تفاصيل المباراة</div>
          </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* ═══════════════ LEADERBOARD ══════════════════════════════════ */
function BoardTab({leaderboard,profile,allPreds,matches}) {
  const medals=["🥇","🥈","🥉"];
  const [sel,setSel] = useState(null);
  const visiblePreds = sel ? (allPreds||[]).filter(function(p){
    const m=matches.find(function(x){return x.id===p.match_id;});
    return p.user_id===sel.id && m && m.status==="finished";
  }).map(function(p){return {pred:p,match:matches.find(function(x){return x.id===p.match_id;})};}) : [];
  return (
    <div>
      <div style={{fontSize:15,fontWeight:700,marginBottom:14,textAlign:"center",color:C.gold}}>🏆 جدول الترتيب · نقاط لحظية</div>
      {leaderboard.length===0 && <div style={{textAlign:"center",padding:40,color:C.sub}}>لا يوجد مشاركون بعد</div>}
      {leaderboard.map(function(u,i){
        const me=u.id===profile.id;
        const clr=i===0?C.gold:i===1?"#c0c0c0":i===2?"#cd7f32":C.text;
        return (
          <div key={u.id} onClick={function(){setSel(u);}} style={{background:me?"linear-gradient(135deg,rgba(240,182,42,.1),rgba(34,208,122,.05))":C.card,border:"1px solid "+(me?C.goldBdr:C.border),borderRadius:16,padding:"13px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
            <div style={{width:36,height:36,borderRadius:11,background:i<3?"rgba(240,182,42,.14)":"rgba(255,255,255,.05)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:i<3?20:12,fontWeight:800,color:i<3?C.gold:C.sub,flexShrink:0}}>
              {i<3?medals[i]:"#"+(i+1)}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:me?C.gold:C.text}}>{u.display_name}{me&&<span style={{fontSize:11.5,color:C.gold,fontWeight:400}}> (أنا)</span>}</div>
              <div style={{fontSize:11.5,color:C.sub}}>@{u.username} · {u.predCount} توقع</div>
            </div>
            <div style={{textAlign:"left"}}>
              <div style={{fontSize:22,fontWeight:900,color:clr}}>{u.pts}</div>
              <div style={{fontSize:11.5,color:C.sub}}>نقطة</div>
            </div>
          </div>
        );
      })}
      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:14,marginTop:10}}>
        <div style={{fontSize:13.5,fontWeight:700,color:C.gold,marginBottom:8}}>📊 نظام النقاط</div>
        {[["🏆 نتيجة صحيحة تماماً","3 نقاط"],["👍 الفائز صح بالأرقام غلط","نقطة"],["🥇 توقع البطل الصحيح","15 نقطة"],["❌ توقع خاطئ","صفر"]].map(function(x){return (
          <div key={x[0]} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+C.border,fontSize:12.5}}>
            <span style={{color:C.sub}}>{x[0]}</span><span style={{fontWeight:700}}>{x[1]}</span>
          </div>
        );})}
        <div style={{marginTop:10,fontSize:11.5,color:C.dim,lineHeight:1.6}}>النقاط تُحسب لحظياً — لو صُحِّحت نتيجة تتغير تلقائياً</div>
      </div>
      {sel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",zIndex:650,display:"flex",alignItems:"flex-end"}} onClick={function(){setSel(null);}}>
          <div onClick={function(e){e.stopPropagation();}} style={{background:"#071832",borderRadius:"22px 22px 0 0",width:"100%",maxHeight:"78vh",overflowY:"auto",padding:"16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <div style={{fontSize:15,fontWeight:900,color:sel.id===profile.id?C.gold:C.text}}>{sel.display_name}{sel.id===profile.id&&" (أنا)"}</div>
                <div style={{fontSize:11.5,color:C.sub}}>@{sel.username} · مباريات منتهية فقط</div>
              </div>
              <button onClick={function(){setSel(null);}} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:9,width:32,height:32,color:C.sub}}>x</button>
            </div>
            {visiblePreds.length===0&&<div style={{textAlign:"center",padding:28,color:C.sub}}>لا توجد توقعات مكشوفة بعد</div>}
            {visiblePreds.map(function(row){
              const p=row.pred,m=row.match,pts=calcPts(p,m)||0;
              return (
                <div key={p.id||m.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:13,padding:12,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,color:C.sub,marginBottom:6}}>
                    <span>{m.team1&&m.team1.name_ar} - {m.team2&&m.team2.name_ar}</span>
                    <span style={{color:pts===3?C.green:pts===1?C.gold:C.red,fontWeight:800}}>{pts} نقطة</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13.5}}>
                    <span>توقعه: <b>{p.pred_team1} - {p.pred_team2}</b></span>
                    <span>النتيجة: <b>{m.result_team1} - {m.result_team2}</b></span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════ ADMIN TAB ════════════════════════════════════ */
function AdminTab({pending,matches,teams,approveUser,setResult,champWin,setChampWinner,syncAPI,pullResults,applyResults,appSettings,toggleSetting,members}) {
  const [pwUser,setPwUser] = useState("");
  const [pwVal,setPwVal] = useState("");
  const [pwMsg,setPwMsg] = useState("");
  const [pwBusy,setPwBusy] = useState(false);
  const doSetPassword = async function(){
    setPwMsg("");
    if(!pwUser){ setPwMsg("اختر العضو"); return; }
    if(pwVal.length<6){ setPwMsg("كلمة المرور 6 أحرف على الأقل"); return; }
    setPwBusy(true);
    try {
      const {data,error} = await sb.functions.invoke("clever-processor",{body:{action:"admin-set-password",userId:pwUser,password:pwVal}});
      if(error) throw error;
      if(data&&data.error) throw new Error(data.error);
      setPwMsg("✅ تم تعيين كلمة المرور — بلّغ العضو بها");
      setPwVal("");
    } catch(e){ setPwMsg("❌ "+String(e.message||e)); }
    setPwBusy(false);
  };
  const [sel,setSel] = useState(null);
  const [r1,setR1] = useState(""), [r2,setR2] = useState("");
  const [busy,setBusy] = useState(false);
  const [champSel,setChampSel] = useState(champWin||"");
  const [champBusy,setChampBusy] = useState(false);
  const [syncMsg,setSyncMsg] = useState("");
  const [syncBusy,setSyncBusy] = useState(false);
  const [apiRows,setApiRows] = useState(null);
  const [pullBusy,setPullBusy] = useState(false);

  const toSet = matches.filter(function(m){return isPast(m.match_utc)&&m.status!=="finished";});
  const teamList = Object.values(teams).sort(function(a,b){return a.group_id.localeCompare(b.group_id);});
  const synced = matches.filter(function(m){return m.api_fixture_id;}).length;

  const doSet = async function(){
    if(!sel||r1===""||r2==="") return;
    setBusy(true);
    await setResult(sel.id,r1,r2);
    setBusy(false); setSel(null); setR1(""); setR2("");
  };
  const doChamp = async function(){
    if(!champSel) return;
    setChampBusy(true); await setChampWinner(champSel); setChampBusy(false);
  };
  const doSync = async function(){
    setSyncBusy(true);
    await syncAPI(setSyncMsg);
    setSyncBusy(false);
  };
  const doPull = async function(){
    setPullBusy(true); setApiRows(null);
    const res = await pullResults();
    setPullBusy(false);
    if(res.error){ setSyncMsg(res.error); return; }
    setApiRows(res.found);
  };
  const doApply = async function(){
    if(!apiRows||!apiRows.length) return;
    setPullBusy(true);
    await applyResults(apiRows);
    setPullBusy(false); setApiRows(null);
  };

  return (
    <div>
      <div style={{fontSize:14,fontWeight:700,color:C.gold,marginBottom:12}}>👥 طلبات الانتساب ({pending.length})</div>
      {pending.length===0?<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:14,marginBottom:16,textAlign:"center",color:C.sub,fontSize:14}}>لا توجد طلبات</div>:pending.map(function(u){return (
        <div key={u.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"11px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <div><div style={{fontSize:14,fontWeight:700}}>{u.display_name}</div><div style={{fontSize:12.5,color:C.sub}}>@{u.username}</div></div>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={function(){approveUser(u.id,true);}} color="green" style={{padding:"7px 14px"}}>قبول</Btn>
            <Btn onClick={function(){approveUser(u.id,false);}} color="red" style={{padding:"7px 14px"}}>رفض</Btn>
          </div>
        </div>
      );})}

      <div style={{fontSize:14,fontWeight:700,color:C.gold,marginBottom:12}}>🔑 تعيين كلمة مرور لعضو</div>
      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:12,marginBottom:16}}>
        <div style={{fontSize:12.5,color:C.sub,marginBottom:8,lineHeight:1.6}}>لمن نسي كلمة مروره: اختر العضو واكتب كلمة مرور جديدة وبلّغه بها. (يوجد أيضاً رابط "نسيت كلمة المرور" في شاشة الدخول يرسل رابط استعادة للإيميل)</div>
        <select value={pwUser} onChange={function(e){setPwUser(e.target.value);}} style={{width:"100%",padding:"10px 12px",background:"rgba(255,255,255,.06)",border:"1px solid "+C.border,borderRadius:10,color:C.text,fontSize:14,fontFamily:"inherit",outline:"none",marginBottom:10}}>
          <option value="">اختر العضو...</option>
          {(members||[]).map(function(u){return <option key={u.id} value={u.id}>{u.display_name} (@{u.username})</option>;})}
        </select>
        <div style={{display:"flex",gap:8}}>
          <input value={pwVal} onChange={function(e){setPwVal(e.target.value);}} placeholder="كلمة المرور الجديدة" type="text"

            try{

              if(error) setSyncMsg("❌ "+JSON.stringify(error).slice(0,70));
